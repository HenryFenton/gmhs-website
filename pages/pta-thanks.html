<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Thank You — GMHS PTA</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="../assets/css/index.css" />
  <style>
    .thanks-wrap {
      min-height: 80vh;
      display: flex; align-items: center; justify-content: center;
      padding: 48px 24px; text-align: center;
      background: var(--cream, #faf7f0);
    }
    .thanks-card {
      background: #fff; border-radius: 16px;
      padding: 56px 48px; max-width: 500px;
      box-shadow: 0 8px 40px rgba(180,140,40,.15);
      border-top: 6px solid #d4a843;
    }
    .thanks-card .t-icon { font-size: 3.5rem; display: block; margin-bottom: 20px; }
    .thanks-card h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.9rem; color: #1e1400; margin: 0 0 14px;
    }
    .thanks-card p { font-size: .9rem; color: #8a7240; line-height: 1.85; margin: 0 0 28px; }
    .btn-home {
      background: #d4a843; color: #1e1400; font-weight: 700;
      padding: 12px 26px; border-radius: 8px;
      text-decoration: none; display: inline-block;
    }
  </style>
  <link href="https://fonts.googleapis.com/css?family=Playfair+Display:700,900" rel="stylesheet" />
</head>
<body>
  <div class="thanks-wrap">
    <div class="thanks-card">
      <span class="t-icon">🤝</span>
      <h1>Thank You!</h1>
      <p>Your interest in the GMHS Parent Teacher Association has been received. A member of our team will be in touch within a few school days.</p>
      <a href="../index.html" class="btn-home">Return to Homepage</a>
    </div>
  </div>
</body>
</html>
